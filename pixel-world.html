<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Swarm Studio</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#1a1a2e;height:100vh;width:100vw;overflow:hidden;font-family:monospace}
  #game-container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
  canvas{image-rendering:pixelated!important;image-rendering:crisp-edges!important;cursor:default;display:block!important;margin:0!important;padding:0!important}
  #editor-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,10,30,0.95);z-index:999999;overflow:auto}
  #editor-modal.active{display:flex;align-items:center;justify-content:center}
  .editor-panel{background:#12122a;border:2px solid #4a9eea;border-radius:8px;width:90%;max-width:600px;max-height:90vh;overflow:auto;padding:20px}
  .editor-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;border-bottom:1px solid #333;padding-bottom:12px}
  .editor-header h2{color:#4a9eea;font-size:16px}
  .editor-close{background:#c04040;color:#fff;border:none;padding:6px 12px;cursor:pointer;border-radius:4px;font-family:monospace}
  .editor-close:hover{background:#e05050}
  .editor-row{margin-bottom:12px}
  .editor-row label{display:block;color:#a0a0a0;font-size:11px;margin-bottom:4px}
  .editor-row input,.editor-row textarea,.editor-row select{width:100%;background:#1a1a2e;border:1px solid #333;color:#e0e0e0;padding:8px;border-radius:4px;font-family:monospace;font-size:12px}
  .editor-row input:focus,.editor-row textarea:focus,.editor-row select:focus{border-color:#4a9eea;outline:none}
  .editor-row textarea{min-height:60px;resize:vertical}
  .editor-row input[type="color"]{width:80px;height:32px;padding:2px;cursor:pointer}
  .editor-section{margin-bottom:16px;padding:12px;background:#0a0a1e;border-radius:4px}
  .editor-section-title{color:#d4a03c;font-size:12px;margin-bottom:10px;font-weight:bold}
  .editor-row-inline{display:flex;gap:12px}
  .editor-row-inline .editor-row{flex:1}
  .editor-footer{display:flex;gap:12px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid #333}
  .btn{padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-family:monospace;font-size:12px}
  .btn-primary{background:#4a9eea;color:#fff}
  .btn-primary:hover{background:#5aaef8}
  .btn-secondary{background:#333;color:#a0a0a0}
  .btn-secondary:hover{background:#444}
  .chip-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .chip{background:#2a2a4e;padding:4px 8px;border-radius:12px;font-size:10px;color:#e0e0e0;display:flex;align-items:center;gap:4px}
  .chip-remove{cursor:pointer;color:#e84855;font-weight:bold}
  .chip-add{background:#1a1a2e;border:1px dashed #4a9eea;color:#4a9eea;cursor:pointer;padding:4px 8px;border-radius:12px;font-size:10px}
  .available-models{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .model-chip{background:#1a1a2e;border:1px solid #333;padding:4px 8px;border-radius:4px;font-size:10px;color:#a0a0a0;cursor:pointer}
  .model-chip:hover{border-color:#4a9eea;color:#4a9eea}
  .model-chip.selected{border-color:#4a9eea;background:#2a2a4e;color:#4a9eea}
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
<div id="game-container"></div>
<div id="editor-modal">
  <div class="editor-panel">
    <div class="editor-header">
      <h2 id="editor-title">Edit Agent</h2>
      <button class="editor-close" onclick="closeEditor()">ESC</button>
    </div>
    <div class="editor-section">
      <div class="editor-section-title">Basic Info</div>
      <div class="editor-row-inline">
        <div class="editor-row">
          <label>ID</label>
          <input type="text" id="edit-id" readonly style="opacity:0.5">
        </div>
        <div class="editor-row">
          <label>Name</label>
          <input type="text" id="edit-name">
        </div>
      </div>
      <div class="editor-row">
        <label>Role</label>
        <input type="text" id="edit-role">
      </div>
      <div class="editor-row">
        <label>Description</label>
        <textarea id="edit-desc"></textarea>
      </div>
      <div class="editor-row-inline">
        <div class="editor-row">
          <label>Zone</label>
          <select id="edit-zone">
            <option value="Research Library">Research Library</option>
            <option value="Design Studio">Design Studio</option>
            <option value="Critique Room">Critique Room</option>
            <option value="Synthesis Hub">Synthesis Hub</option>
          </select>
        </div>
        <div class="editor-row">
          <label>Accent Color</label>
          <input type="color" id="edit-zc">
        </div>
      </div>
    </div>
    <div class="editor-section">
      <div class="editor-section-title">Appearance</div>
      <div class="editor-row-inline">
        <div class="editor-row">
          <label>Shirt Color</label>
          <input type="color" id="edit-shirt">
        </div>
        <div class="editor-row">
          <label>Hair Color</label>
          <input type="color" id="edit-hair">
        </div>
        <div class="editor-row">
          <label>Facing</label>
          <select id="edit-facing">
            <option value="down">Down</option>
            <option value="up">Up</option>
            <option value="left">Left</option>
            <option value="right">Right</option>
          </select>
        </div>
      </div>
      <div class="editor-row-inline">
        <div class="editor-row">
          <label>Tile X</label>
          <input type="number" id="edit-tx" min="0" max="26">
        </div>
        <div class="editor-row">
          <label>Tile Y</label>
          <input type="number" id="edit-ty" min="0" max="14">
        </div>
        <div class="editor-row">
          <label>Idle Animation</label>
          <select id="edit-idle">
            <option value="look">Look Around</option>
            <option value="type">Typing</option>
          </select>
        </div>
      </div>
    </div>
    <div class="editor-section">
      <div class="editor-section-title">Brain & System</div>
      <div class="editor-row">
        <label>Brain (LiteLLM Model)</label>
        <input type="text" id="edit-brain" placeholder="litellm/glm-latest">
        <div class="available-models" id="available-models"></div>
      </div>
      <div class="editor-row">
        <label>System Prompt</label>
        <textarea id="edit-systemPrompt" placeholder="Key instruction for the agent..."></textarea>
      </div>
    </div>
    <div class="editor-section">
      <div class="editor-section-title">Tools</div>
      <div class="chip-list" id="edit-tools-list"></div>
      <div class="chip-add" onclick="addTool()">+ Add Tool</div>
    </div>
    <div class="editor-section">
      <div class="editor-section-title">MCP Servers</div>
      <div class="chip-list" id="edit-mcp-list"></div>
      <div class="chip-add" onclick="addMcp()">+ Add MCP</div>
    </div>
    <div class="editor-section">
      <div class="editor-section-title">Skills</div>
      <div class="chip-list" id="edit-skills-list"></div>
      <div class="chip-add" onclick="addSkill()">+ Add Skill</div>
    </div>
    <div class="editor-footer">
      <button class="btn btn-secondary" onclick="closeEditor()">Cancel</button>
      <button class="btn btn-primary" onclick="saveAgent()">Save Changes</button>
    </div>
  </div>
</div>
<script>
const MAP_W=27, MAP_H=15, ZOOM=1;
const TILE=16; // Original tile size

// --- Helpers ---
function hex(c){return '#'+(c>>>0).toString(16).padStart(6,'0')}
function darken(c,a){return(Math.max(0,((c>>16)&0xff)-a)<<16)|(Math.max(0,((c>>8)&0xff)-a)<<8)|Math.max(0,(c&0xff)-a)}
function lighten(c,a){return(Math.min(255,((c>>16)&0xff)+a)<<16)|(Math.min(255,((c>>8)&0xff)+a)<<8)|Math.min(255,(c&0xff)+a)}
function randInt(a,b){return a+Math.floor(Math.random()*(b-a+1))}
function makeCanvas(w,h){const c=document.createElement('canvas');c.width=w;c.height=h;return c}
function px(ctx,x,y,w,h,color,alpha){if(alpha!==undefined)ctx.globalAlpha=alpha;ctx.fillStyle=hex(color);ctx.fillRect(x,y,w,h);if(alpha!==undefined)ctx.globalAlpha=1}

// --- Zone Palettes ---
const ZP={
  lib:{floor:0x6b5240,floor2:0x7a6150,wall:0x8b7355,accent:0xd4a03c},
  stu:{floor:0xd0c8c0,floor2:0xc0b8b0,wall:0xe8e0d8,accent:0xe84855},
  cri:{floor:0x404858,floor2:0x485060,wall:0x505868,accent:0xf0a040},
  hub:{floor:0x3a5040,floor2:0x4a6050,wall:0x506858,accent:0xf0d860},
  hall:{floor:0xb0a898,floor2:0xa09888},
};

// --- Tile Types ---
const T={
  FLOOR_LIB:0,FLOOR_STU:1,FLOOR_CRI:2,FLOOR_HUB:3,FLOOR_HALL:4,
  WALL_LIB:10,WALL_STU:11,WALL_CRI:12,WALL_HUB:13,
  DESK:20,BOOKSHELF:21,EASEL:22,DRAW_TABLE:23,REV_BOARD:24,
  ROUND_TABLE:25,LAMP:27,PLANT:28,RUG:29,
};

// Impassable tile types
const SOLID=new Set([T.WALL_LIB,T.WALL_STU,T.WALL_CRI,T.WALL_HUB,T.DESK,T.BOOKSHELF,T.EASEL,T.DRAW_TABLE,T.REV_BOARD,T.ROUND_TABLE,T.LAMP,T.PLANT]);

// --- 13 Agents ---
const AGENTS=[
  {id:'scout',name:'Scout',role:'Competitive Research',zone:'Research Library',zc:0xd4a03c,
   desc:'Searches real products for design patterns using Refero MCP.',tx:3,ty:4,facing:'down',
   shirt:0x8b4513,hair:0x2a2a2a,idle:'look',
   brain:'litellm/glm-latest',systemPrompt:'Find and analyze best existing solutions to similar design problems. Extract actionable patterns.',
   tools:[],mcp:['refero'],skills:['research-competitive']},
  {id:'scholar',name:'Scholar',role:'Best Practices Research',zone:'Research Library',zc:0xd4a03c,
   desc:'Searches web for UX guidelines, accessibility standards, and design system docs.',tx:9,ty:4,facing:'down',
   shirt:0x5c5080,hair:0xd4a017,idle:'look',
   brain:'litellm/claude-sonnet-4-6',systemPrompt:'Research UX guidelines, accessibility standards, and design system best practices.',
   tools:['webfetch'],mcp:['deepwiki'],skills:['research-best-practices']},

  {id:'palette',name:'Palette',role:'UI Variations Generator',zone:'Design Studio',zc:0xe84855,
   desc:'Creates 5+ distinct visual layout options with design rationale.',tx:16,ty:4,facing:'down',
   shirt:0xe84855,hair:0x5c3a1e,idle:'type',
   brain:'litellm/claude-opus-4-5',systemPrompt:'Generate 5+ distinct visual layout variations. Each must follow UI laws and serve different user needs.',
   tools:[],mcp:[],skills:['generate-ui']},
  {id:'flow',name:'Flow',role:'UX Flow Architect',zone:'Design Studio',zc:0x4a9eea,
   desc:'Designs interaction patterns, user flows, state machines, and transitions.',tx:19,ty:4,facing:'down',
   shirt:0x4a9eea,hair:0x2a2a2a,idle:'type',
   brain:'litellm/claude-opus-4-6',systemPrompt:'Design interaction patterns, user flows, state machines. Apply UX laws and handle edge cases.',
   tools:[],mcp:[],skills:['generate-ux']},
  {id:'blueprint',name:'Blueprint',role:'Figma Specs Generator',zone:'Design Studio',zc:0x4a9eea,
   desc:'Creates detailed YAML design specs for Figma: frames, typography, colors, spacing.',tx:22,ty:4,facing:'down',
   shirt:0x4ac7ea,hair:0x8b4513,idle:'type',
   brain:'litellm/glm-latest',systemPrompt:'Create detailed YAML design specifications for Figma implementation.',
   tools:[],mcp:['figma'],skills:['generate-figma-specs']},
  {id:'forge',name:'Forge',role:'Code Generator',zone:'Design Studio',zc:0x4abc6a,
   desc:'Generates production-ready React/TypeScript/Tailwind implementation.',tx:25,ty:4,facing:'down',
   shirt:0x4abc6a,hair:0x5c3a1e,idle:'type',
   brain:'litellm/claude-sonnet-4-5',systemPrompt:'Generate clean, accessible, production-ready React/TypeScript/Tailwind code.',
   tools:['bash'],mcp:[],skills:['generate-code']},

  {id:'lens',name:'Lens',role:'UX Critique Agent',zone:'Critique Room',zc:0xf0a040,
   desc:'Deep heuristic evaluation using Nielsen\'s 10 usability heuristics and UX laws.',tx:3,ty:11,facing:'down',
   shirt:0xf0a040,hair:0x2a2a2a,idle:'look',
   brain:'litellm/claude-opus-4-5',systemPrompt:'Perform deep heuristic evaluation using Nielsen\'s 10 heuristics and UX laws.',
   tools:[],mcp:[],skills:['critique-ux']},
  {id:'eye',name:'Eye',role:'UI Aesthetics Critic',zone:'Critique Room',zc:0xf0a040,
   desc:'Evaluates visual hierarchy, spacing, color usage, typography, and consistency.',tx:6,ty:11,facing:'down',
   shirt:0xc0508c,hair:0xd4a017,idle:'look',
   brain:'litellm/glm-latest',systemPrompt:'Evaluate visual hierarchy, spacing, color usage, typography, and consistency.',
   tools:[],mcp:[],skills:['critique-ui']},
  {id:'mirror',name:'Mirror',role:'Persona Simulator',zone:'Critique Room',zc:0xf0a040,
   desc:'Role-plays target users: seniors, first-timers, power users, stressed users.',tx:10,ty:11,facing:'down',
   shirt:0x70a0c0,hair:0x8b4513,idle:'look',
   brain:'litellm/claude-sonnet-4-6',systemPrompt:'Role-play target users: seniors, first-timers, power users, stressed users.',
   tools:[],mcp:[],skills:['critique-persona']},

  {id:'council',name:'Council',role:'Review Panel',zone:'Synthesis Hub',zc:0xf0d860,
   desc:'3-persona review panel: Ramesh (user), Priya (senior), Arjun (peer designer).',tx:16,ty:12,facing:'down',
   shirt:0xb8860b,hair:0x2a2a2a,idle:'look',
   brain:'litellm/claude-opus-4-6',systemPrompt:'Run 3-persona review: Ramesh (user), Priya (senior designer), Arjun (peer designer).',
   tools:[],mcp:[],skills:['review-panel']},
  {id:'weaver',name:'Weaver',role:'Design Synthesizer',zone:'Synthesis Hub',zc:0xf0d860,
   desc:'Merges all research, variations, and critiques into a unified final proposal.',tx:19,ty:12,facing:'left',
   shirt:0x80b060,hair:0x5c3a1e,idle:'type',
   brain:'litellm/claude-opus-4-5',systemPrompt:'Merge all research, variations, and critiques into a unified final proposal.',
   tools:[],mcp:[],skills:['synthesize-design']},
  {id:'gate',name:'Gate',role:'Quality Gate',zone:'Synthesis Hub',zc:0xf0d860,
   desc:'Mandatory quality framework for ALL design discussions and outputs.',tx:22,ty:12,facing:'up',
   shirt:0xc04040,hair:0xd4a017,idle:'look',
   brain:'litellm/glm-latest',systemPrompt:'Enforce mandatory quality framework: discovery → research → design → critique → validation.',
   tools:[],mcp:[],skills:['design-quality-gate']},
  {id:'check',name:'Check',role:'Design Checklist',zone:'Synthesis Hub',zc:0xf0d860,
   desc:'Rapid validation checklist for quick reviews and self-checks.',tx:25,ty:12,facing:'right',
   shirt:0x50a878,hair:0x2a2a2a,idle:'type',
   brain:'litellm/glm-flash-experimental',systemPrompt:'Run rapid validation checklist for quick reviews and self-checks.',
   tools:[],mcp:[],skills:['design-checklist']},
];

// --- Map Builder ---
function makeStudioMap(){
  const m=Array.from({length:MAP_H},()=>Array(MAP_W).fill(T.FLOOR_HALL));
  function fill(x0,y0,w,h,t){for(let y=y0;y<y0+h;y++)for(let x=x0;x<x0+w;x++)if(y>=0&&y<MAP_H&&x>=0&&x<MAP_W)m[y][x]=t;}
  function set(x,y,t){if(y>=0&&y<MAP_H&&x>=0&&x<MAP_W)m[y][x]=t;}

  // Zone floors (13x7 each)
  fill(0,0,13,7,T.FLOOR_LIB);
  fill(14,0,13,7,T.FLOOR_STU);
  fill(0,8,13,7,T.FLOOR_CRI);
  fill(14,8,13,7,T.FLOOR_HUB);

  // Walls (top row of each zone)
  fill(0,0,13,1,T.WALL_LIB);
  fill(14,0,13,1,T.WALL_STU);
  fill(0,8,13,1,T.WALL_CRI);
  fill(14,8,13,1,T.WALL_HUB);

  // --- Research Library furniture ---
  for(let x of [1,2,5,6,9,10]) set(x,1,T.BOOKSHELF);
  set(3,3,T.DESK); set(4,3,T.DESK);
  set(1,5,T.LAMP); set(11,5,T.LAMP);
  set(0,5,T.PLANT); set(12,5,T.PLANT);

  // --- Design Studio furniture ---
  set(16,1,T.EASEL); set(19,1,T.EASEL); set(22,1,T.EASEL); set(25,1,T.EASEL);
  set(16,3,T.DRAW_TABLE); set(17,3,T.DRAW_TABLE);
  set(21,3,T.DRAW_TABLE); set(22,3,T.DRAW_TABLE);
  set(15,5,T.PLANT); set(25,5,T.PLANT);

  // --- Critique Room furniture ---
  set(2,9,T.REV_BOARD); set(3,9,T.REV_BOARD);
  set(7,9,T.REV_BOARD); set(8,9,T.REV_BOARD);
  set(2,11,T.DESK); set(3,11,T.DESK);
  set(1,13,T.LAMP); set(11,13,T.LAMP);

  // --- Synthesis Hub furniture ---
  for(let y=11;y<=13;y++) for(let x=17;x<=21;x++) set(x,y,T.ROUND_TABLE);
  set(15,13,T.PLANT); set(25,13,T.PLANT);

  // Corridor plants at corners
  set(13,0,T.PLANT); set(13,14,T.PLANT);

  return m;
}
const worldMap=makeStudioMap();

// --- Texture Generation ---
const textures={};

// Zone floor tiles (2 variants each)
function makeFloorTex(key,col1,col2){
  for(let v=0;v<2;v++){
    const c=makeCanvas(TILE,TILE),x=c.getContext('2d');
    px(x,0,0,TILE,TILE,v===0?col1:col2);
    for(let i=0;i<6;i++) px(x,randInt(0,14),randInt(0,14),2,2,v===0?col2:col1,0.3);
    textures[key+v]=c;
  }
}
makeFloorTex('libFloor',ZP.lib.floor,ZP.lib.floor2);
makeFloorTex('stuFloor',ZP.stu.floor,ZP.stu.floor2);
makeFloorTex('criFloor',ZP.cri.floor,ZP.cri.floor2);
makeFloorTex('hubFloor',ZP.hub.floor,ZP.hub.floor2);
makeFloorTex('hallFloor',ZP.hall.floor,ZP.hall.floor2);

// Wall tiles
function makeWallTex(key,col,trimCol){
  const c=makeCanvas(TILE,TILE),x=c.getContext('2d');
  px(x,0,0,TILE,TILE,col);
  px(x,0,TILE-3,TILE,3,darken(col,20));
  px(x,0,TILE-1,TILE,1,trimCol);
  // Panel seam
  px(x,7,0,1,TILE-3,darken(col,15),0.5);
  textures[key]=c;
}
makeWallTex('wallLib',ZP.lib.wall,ZP.lib.accent);
makeWallTex('wallStu',ZP.stu.wall,ZP.stu.accent);
makeWallTex('wallCri',ZP.cri.wall,ZP.cri.accent);
makeWallTex('wallHub',ZP.hub.wall,ZP.hub.accent);

// --- Furniture Textures ---

// Desk
{const c=makeCanvas(TILE,TILE),x=c.getContext('2d');
px(x,1,4,14,4,0x8b6c42); px(x,1,4,14,1,0x9c7c52);
px(x,2,8,3,7,0x6b5240); px(x,11,8,3,7,0x6b5240);
// Paper on desk
px(x,4,5,5,2,0xf0ece0);
textures.desk=c;}

// Bookshelf
{const c=makeCanvas(TILE,TILE),x=c.getContext('2d');
px(x,0,0,TILE,TILE,0x5c3a1e);
// Shelves
for(let sy of [0,4,8,12]) px(x,0,sy,TILE,1,0x4a2e16);
// Books
const bookColors=[0xc04040,0x4070b0,0x40a050,0xd4a030,0x8050a0,0xd07030];
for(let sy of [1,5,9,13]){
  let bx=1;
  while(bx<15){
    const bw=randInt(1,3);
    px(x,bx,sy,bw,3,bookColors[randInt(0,bookColors.length-1)]);
    bx+=bw+1;
  }
}
textures.bookshelf=c;}

// Easel
{const c=makeCanvas(TILE,TILE),x=c.getContext('2d');
// Legs
px(x,3,8,1,8,0x6b5240); px(x,12,8,1,8,0x6b5240); px(x,7,10,2,6,0x6b5240);
// Canvas
px(x,3,1,10,8,0xf5f0e8); px(x,3,1,10,1,0xd0c8b8); px(x,3,1,1,8,0xd0c8b8);
// Paint splotches
px(x,5,3,2,2,0xe84855,0.7); px(x,8,4,2,2,0x4a9eea,0.7); px(x,6,6,3,1,0xf5d547,0.7);
textures.easel=c;}

// Drawing table
{const c=makeCanvas(TILE,TILE),x=c.getContext('2d');
px(x,1,3,14,5,0xc0b8a8); px(x,1,3,14,1,0xd0c8b8);
px(x,6,8,4,8,0x6b5240);
// Blueprint on surface
px(x,3,4,8,3,0x8ab8d0,0.6);
px(x,4,5,6,1,0xf0f0f0,0.4);
textures.drawTable=c;}

// Review board
{const c=makeCanvas(TILE,TILE),x=c.getContext('2d');
px(x,0,0,TILE,TILE,0xf0ece0);
px(x,0,0,TILE,1,0x808080); px(x,0,0,1,TILE,0x808080);
px(x,TILE-1,0,1,TILE,0x808080); px(x,0,TILE-1,TILE,1,0x808080);
// Sticky notes
px(x,2,2,3,3,0xf5d547); px(x,6,2,3,3,0xff9090);
px(x,10,2,3,3,0x90d0ff); px(x,2,7,3,3,0x90e890);

// --- Character Sprites ---
function makeChar(prefix,shirtCol,hairCol){
  ['down','up','left','right'].forEach(dir=>{
    for(let frame=0;frame<2;frame++){
      const c=makeCanvas(TILE,TILE),x=c.getContext('2d');
      const isL=dir==='left',isR=dir==='right',side=isL||isR;
      px(x,4,14,8,2,0x000000,0.12);
      const lo=frame===0?0:1;
      px(x,5-lo,12,3,3,0x3a4a6b); px(x,8+lo,12,3,3,0x3a4a6b);
      px(x,5-lo,14,3,1,0x4a3020); px(x,8+lo,14,3,1,0x4a3020);
      px(x,4,7,8,5,shirtCol);
      px(x,side?(isL?4:8):7,8,side?3:2,4,darken(shirtCol,25));
      if(side){px(x,isL?10:2,frame===0?8:7,2,frame===0?4:5,0xf0c8a0);}
      else{px(x,2,8,2,4,0xf0c8a0);px(x,12,8,2,4,0xf0c8a0);}
      px(x,4,1,8,7,0xf0c8a0);
      if(dir==='up'){px(x,4,1,8,3,hairCol);px(x,3,2,1,3,hairCol);px(x,12,2,1,3,hairCol);}
      else if(dir==='down'){px(x,4,1,8,2,hairCol);px(x,3,1,1,4,hairCol);px(x,12,1,1,4,hairCol);}
      else{px(x,4,1,8,2,hairCol);px(x,isL?10:3,1,3,5,hairCol);px(x,isL?3:12,2,1,3,hairCol);}
      if(dir!=='up'){
        if(side){px(x,isL?5:8,4,3,2,0xffffff);px(x,isL?5:9,4,2,2,0x111111);}
        else{px(x,5,4,2,2,0xffffff);px(x,9,4,2,2,0xffffff);px(x,6,4,1,2,0x111111);px(x,9,4,1,2,0x111111);}
      }
      if(dir==='down')px(x,7,6,2,1,0xd4a080);
      textures[prefix+'_'+dir+'_'+frame]=c;
    }
  });
}

// --- Zone name helper ---
function getZone(tx,ty){
  if(tx<=12&&ty<=6)return'Research Library';
  if(tx>=14&&ty<=6)return'Design Studio';
  if(tx<=12&&ty>=8)return'Critique Room';
  if(tx>=14&&ty>=8)return'Synthesis Hub';
  return'Corridor';
}

// --- Tile→texture mapping ---
function tileTex(t,x,y){
  const v=(x*7+y*13)%2;
  switch(t){
    case T.FLOOR_LIB:return'libFloor'+v;
    case T.FLOOR_STU:return'stuFloor'+v;
    case T.FLOOR_CRI:return'criFloor'+v;
    case T.FLOOR_HUB:return'hubFloor'+v;
    case T.FLOOR_HALL:return'hallFloor'+v;
    case T.WALL_LIB:return'wallLib';
    case T.WALL_STU:return'wallStu';
    case T.WALL_CRI:return'wallCri';
    case T.WALL_HUB:return'wallHub';
    case T.DESK:return'desk';
    case T.BOOKSHELF:return'bookshelf';
    case T.EASEL:return'easel';
    case T.DRAW_TABLE:return'drawTable';
    case T.REV_BOARD:return'revBoard';
    case T.ROUND_TABLE:return'roundTable';
    case T.LAMP:return'lamp';
    case T.PLANT:return'plant';
    case T.RUG:return'rug';
    default:return'hallFloor0';
  }
}

// Floor under furniture
function floorForTile(tx,ty){
  if(tx<=12&&ty<=6)return'libFloor'+((tx*7+ty*13)%2);
  if(tx>=14&&ty<=6)return'stuFloor'+((tx*7+ty*13)%2);
  if(tx<=12&&ty>=8)return'criFloor'+((tx*7+ty*13)%2);
  if(tx>=14&&ty>=8)return'hubFloor'+((tx*7+ty*13)%2);
  return'hallFloor'+((tx*7+ty*13)%2);
}

// --- SCENE ---
class GameScene extends Phaser.Scene{
  constructor(){super('GameScene')}

  create(){
    // Register textures
    for(const[key,canvas]of Object.entries(textures)) this.textures.addCanvas(key,canvas);

    // Render ground + furniture
    this.colliders=[];
    const furnitureTypes=new Set([T.DESK,T.BOOKSHELF,T.EASEL,T.DRAW_TABLE,T.REV_BOARD,T.ROUND_TABLE,T.LAMP,T.PLANT]);

    for(let y=0;y<MAP_H;y++) for(let x=0;x<MAP_W;x++){
      const t=worldMap[y][x];
      const px=x*TILE+TILE/2, py=y*TILE+TILE/2;

      // Always draw floor first for furniture tiles
      if(furnitureTypes.has(t)||t===T.RUG){
        this.add.image(px,py,floorForTile(x,y));
      }

      if(furnitureTypes.has(t)){
        // Furniture on top of floor
        this.add.image(px,py,tileTex(t,x,y)).setDepth(y*TILE);
        if(SOLID.has(t)) this.colliders.push({x,y});
      } else if(t===T.RUG){
        this.add.image(px,py,'rug').setDepth(0);
      } else {
        // Regular ground/wall
        this.add.image(px,py,tileTex(t,x,y));
        if(SOLID.has(t)) this.colliders.push({x,y});
      }
    }

    // --- Zone Labels ---
    const labelStyle={fontSize:'6px',fontFamily:'monospace',color:'#ffffff',stroke:'#000000',strokeThickness:2,resolution:2};
    [{t:'RESEARCH LIBRARY',x:6,y:0,c:ZP.lib.accent},{t:'DESIGN STUDIO',x:20,y:0,c:ZP.stu.accent},
     {t:'CRITIQUE ROOM',x:6,y:8,c:ZP.cri.accent},{t:'SYNTHESIS HUB',x:20,y:8,c:ZP.hub.accent}
    ].forEach(l=>{
      this.add.text(l.x*TILE+TILE/2,l.y*TILE+TILE/2+1,l.t,{...labelStyle,color:hex(l.c)}).setOrigin(0.5).setDepth(300);
    });

    // --- Agents ---
    this.agents=[];
    AGENTS.forEach(a=>{
      const spr=this.add.sprite(a.tx*TILE+TILE/2,a.ty*TILE+TILE/2,a.id+'_'+a.facing+'_0').setDepth(a.ty*TILE);
      spr.setInteractive({useHandCursor:true});

      const label=this.add.text(spr.x,spr.y-11,a.name,{
        fontSize:'6px',fontFamily:'monospace',color:hex(a.zc),stroke:'#111111',strokeThickness:2,resolution:2
      }).setOrigin(0.5).setDepth(a.ty*TILE+1);

      const agentData={
        ...a,spr,label,
        idleTimer:0,idleState:'idle',
        lookDir:a.facing,nextIdleAt:randInt(2000,5000),
        lookDuration:0,typeFrame:0,nextPauseAt:randInt(2000,5000),pauseDuration:0,
      };

      spr.on('pointerdown',()=>{this._clickedAgent=true;this.showPopover(agentData);});
      this.agents.push(agentData);
      // Agent tile is a collider
      this.colliders.push({x:a.tx,y:a.ty});
    });

    // --- Player ---
    this.player=this.add.sprite(13*TILE+TILE/2,6*TILE+TILE/2,'player_down_0').setDepth(10000);
    this.pDir='down';this.pFrame=0;this.pTX=13;this.pTY=6;
    this.moving=false;this.targX=this.player.x;this.targY=this.player.y;

    // Camera
    this.cameras.main.startFollow(this.player,true,0.08,0.08);
    this.cameras.main.setZoom(ZOOM);
    this.cameras.main.setBounds(0,0,MAP_W*TILE,MAP_H*TILE);
    this.cameras.main.setRoundPixels(true);

    // Input
    this.cursors=this.input.keyboard.createCursorKeys();
    this.wasd=this.input.keyboard.addKeys({up:'W',down:'S',left:'A',right:'D'});
    this.zoomKeys=this.input.keyboard.addKeys({zoomIn:'PLUS',zoomIn2:'NUMPAD_ADD',zoomOut:'MINUS',zoomOut2:'NUMPAD_SUBTRACT',reset:'R'});
    
    // Keyboard zoom
    this.input.keyboard.on('keydown-PLUS',()=>this.setZoom(this.currentZoom+this.zoomSpeed));
    this.input.keyboard.on('keydown-MINUS',()=>this.setZoom(this.currentZoom-this.zoomSpeed));
    this.input.keyboard.on('keydown-NUMPAD_ADD',()=>this.setZoom(this.currentZoom+this.zoomSpeed));
    this.input.keyboard.on('keydown-NUMPAD_SUBTRACT',()=>this.setZoom(this.currentZoom-this.zoomSpeed));
    this.input.keyboard.on('keydown-R',()=>this.setZoom(ZOOM));
    
    // Mouse wheel zoom
    this.input.on('wheel',(pointer,gameObjects,deltaX,deltaY)=>{
      if(deltaY>0)this.setZoom(this.currentZoom-this.zoomSpeed);
      else if(deltaY<0)this.setZoom(this.currentZoom+this.zoomSpeed);
    });

    // Click to dismiss popover
    this.input.on('pointerdown',()=>{
      if(!this._clickedAgent&&!this._internalClick&&this.activePopover) this.dismissPopover();
      this._clickedAgent=false;
      this._internalClick=false;
    });

    // Day overlay (dimmer for indoor)
    this.dayOverlay=this.add.rectangle(MAP_W*TILE/2,MAP_H*TILE/2,MAP_W*TILE,MAP_H*TILE,0x0a0a2e,0).setDepth(200000);
    this.dayTime=0.4;this.daySpeed=0.006;

    // HUD
    this.add.rectangle(4,4,150,52,0x0a0a2e,0.7).setOrigin(0,0).setDepth(300000).setScrollFactor(0);
    this.hudZone=this.add.text(8,6,'',{fontSize:'7px',fontFamily:'monospace',color:'#f0d890',resolution:2}).setDepth(300001).setScrollFactor(0);
    this.hudCoord=this.add.text(8,16,'',{fontSize:'7px',fontFamily:'monospace',color:'#c0c0c0',resolution:2}).setDepth(300001).setScrollFactor(0);
    this.hudTime=this.add.text(8,26,'',{fontSize:'7px',fontFamily:'monospace',color:'#a0a0a0',resolution:2}).setDepth(300001).setScrollFactor(0);
    this.hudZoom=this.add.text(8,36,'',{fontSize:'7px',fontFamily:'monospace',color:'#4a9eea',resolution:2}).setDepth(300001).setScrollFactor(0);
    
    // Zoom controls
    this.currentZoom=ZOOM;
    this.minZoom=0.5;
    this.maxZoom=4;
    this.zoomSpeed=0.25;
    
    // Zoom buttons (bottom-left HUD)
    const zoomBtnY=MAP_H*TILE-10;
    const zoomBg=this.add.rectangle(30,zoomBtnY,50,12,0x000000,0.6).setDepth(300000).setScrollFactor(0).setOrigin(0.5);
    this.zoomInBtn=this.add.text(12,zoomBtnY,'[+]',{fontSize:'8px',fontFamily:'monospace',color:'#4a9eea',resolution:2}).setDepth(300001).setScrollFactor(0).setOrigin(0.5).setInteractive({useHandCursor:true});
    this.zoomOutBtn=this.add.text(48,zoomBtnY,'[-]',{fontSize:'8px',fontFamily:'monospace',color:'#4a9eea',resolution:2}).setDepth(300001).setScrollFactor(0).setOrigin(0.5).setInteractive({useHandCursor:true});
    
    this.zoomInBtn.on('pointerdown',()=>{this._internalClick=true;this.setZoom(this.currentZoom+this.zoomSpeed);});
    this.zoomOutBtn.on('pointerdown',()=>{this._internalClick=true;this.setZoom(this.currentZoom-this.zoomSpeed);});

    // Instruction
    const iBg=this.add.rectangle(this.scale.width/(ZOOM*2),MAP_H*TILE-10,200,12,0x000000,0.6).setDepth(300000).setScrollFactor(0);
    const iTx=this.add.text(this.scale.width/(ZOOM*2),MAP_H*TILE-10,'WASD: move | Scroll/+/-: zoom | R: reset | Click: agents',{fontSize:'5px',fontFamily:'monospace',color:'#b0b0b0',resolution:2}).setOrigin(0.5).setDepth(300001).setScrollFactor(0);
    this.time.delayedCall(6000,()=>{this.tweens.add({targets:[iBg,iTx],alpha:0,duration:1000});});

    this.activePopover=null;
    this._clickedAgent=false;
  }

  // --- Popover ---
  showPopover(agent){
    this.dismissPopover();
    const pw=140,ph=52;
    const cam=this.cameras.main;
    const wv=cam.worldView;

    let popX=agent.spr.x;
    let popY=agent.spr.y-14-ph/2;
    popX=Math.max(wv.x+pw/2+2,Math.min(wv.x+wv.width-pw/2-2,popX));
    popY=Math.max(wv.y+ph/2+2,Math.min(wv.y+wv.height-ph/2-2,popY));
    if(popY+ph/2+4>agent.spr.y-8 && popY-ph/2<agent.spr.y+8){
      popY=agent.spr.y+14+ph/2;
      popY=Math.min(wv.y+wv.height-ph/2-2,popY);
    }

    const container=this.add.container(popX,popY).setDepth(250000);

    // BG
    const bg=this.add.rectangle(0,0,pw,ph,0x12122a,0.95).setStrokeStyle(2,agent.zc);
    container.add(bg);

    // Inner border glow
    container.add(this.add.rectangle(0,0,pw-6,ph-6,agent.zc,0.06));

    // Icon
    const iconKey='icon_'+agent.id;
    if(this.textures.exists(iconKey)){
      container.add(this.add.image(-pw/2+4,-ph/2+4,iconKey).setOrigin(0,0));
    }

    // Name
    container.add(this.add.text(-pw/2+18,-ph/2+3,agent.name,{
      fontSize:'7px',fontFamily:'monospace',color:hex(agent.zc),resolution:2
    }));

    // Role
    container.add(this.add.text(-pw/2+18,-ph/2+12,agent.role,{
      fontSize:'5px',fontFamily:'monospace',color:'#a0a0a0',resolution:2
    }));

    // Separator
    container.add(this.add.rectangle(0,-ph/2+20,pw-6,1,agent.zc,0.4));

    // Description
    container.add(this.add.text(-pw/2+4,-ph/2+23,agent.desc,{
      fontSize:'5px',fontFamily:'monospace',color:'#d0d0d0',resolution:2,
      wordWrap:{width:pw-8},lineSpacing:1
    }));

    // Zone badge (bottom-right)
    container.add(this.add.text(pw/2-4,ph/2-3,agent.zone,{
      fontSize:'4px',fontFamily:'monospace',color:hex(agent.zc),resolution:2
    }).setOrigin(1,1));

    // Expand button (bottom-left)
    const expandBtn=this.add.text(-pw/2+4,ph/2-3,'[+]',{
      fontSize:'5px',fontFamily:'monospace',color:'#808080',resolution:2
    }).setOrigin(0,1).setInteractive({useHandCursor:true});
    container.add(expandBtn);

    // Edit button (bottom-center)
    const editBtn=this.add.text(0,ph/2-3,'[Edit]',{
      fontSize:'5px',fontFamily:'monospace',color:'#4a9eea',resolution:2
    }).setOrigin(0.5,1).setInteractive({useHandCursor:true});
    container.add(editBtn);

    // Detail panel (initially hidden)
    const detailH=38;
    const detailY=ph/2+detailH/2+4;
    const detailContainer=this.add.container(0,detailY).setVisible(false).setDepth(250001);
    
    const detailBg=this.add.rectangle(0,0,pw,detailH,0x0a0a1e,0.95).setStrokeStyle(1,agent.zc,0.5);
    detailContainer.add(detailBg);

    // Brain badge
    const brainShort=agent.brain.replace('litellm/','');
    detailContainer.add(this.add.text(-pw/2+4,-detailH/2+2,'Brain: '+brainShort,{
      fontSize:'5px',fontFamily:'monospace',color:'#4a9eea',resolution:2
    }));

    // Tools
    const toolsStr=agent.tools.length?agent.tools.join(', '):'none';
    detailContainer.add(this.add.text(-pw/2+4,-detailH/2+10,'Tools: '+toolsStr,{
      fontSize:'5px',fontFamily:'monospace',color:'#50a878',resolution:2
    }));

    // MCP
    const mcpStr=agent.mcp.length?agent.mcp.join(', '):'none';
    detailContainer.add(this.add.text(-pw/2+4,-detailH/2+18,'MCP: '+mcpStr,{
      fontSize:'5px',fontFamily:'monospace',color:'#d4a03c',resolution:2
    }));

    // Skills
    const skillsStr=agent.skills.length?agent.skills.join(', '):'none';
    detailContainer.add(this.add.text(-pw/2+4,-detailH/2+26,'Skills: '+skillsStr,{
      fontSize:'5px',fontFamily:'monospace',color:'#e84855',resolution:2
    }));

    container.add(detailContainer);

    // Toggle expand - use flag to prevent dismiss
    let expanded=false;
    expandBtn.on('pointerdown',(pointer,event)=>{
      this._internalClick=true;
      expanded=!expanded;
      detailContainer.setVisible(expanded);
      expandBtn.setText(expanded?'[-]':'[+]');
      expandBtn.setColor(expanded?hex(agent.zc):'#808080');
    });

    // Edit button - open full editor
    editBtn.on('pointerdown',(pointer,event)=>{
      this._internalClick=true;
      this.dismissPopover();
      openEditor(agent,this);
    });

    // Arrow
    const belowAgent=popY>agent.spr.y;
    container.add(this.add.rectangle(
      Math.max(-pw/2+4,Math.min(pw/2-4,agent.spr.x-popX)),
      belowAgent?-ph/2-2:ph/2+2,
      3,3,agent.zc).setAngle(45));

    // Animate in
    container.setScale(0.7).setAlpha(0);
    this.tweens.add({targets:container,scaleX:1,scaleY:1,alpha:1,duration:150,ease:'Back.easeOut'});

    this.activePopover=container;
  }

  dismissPopover(){
    if(this.activePopover){
      const p=this.activePopover;
      this.activePopover=null;
      this.tweens.add({targets:p,alpha:0,scaleX:0.7,scaleY:0.7,duration:100,ease:'Quad.easeIn',onComplete:()=>p.destroy()});
    }
  }

  canMove(tx,ty){
    if(tx<0||tx>=MAP_W||ty<0||ty>=MAP_H)return false;
    return!this.colliders.some(c=>c.x===tx&&c.y===ty);
  }

  setZoom(newZoom){
    this.currentZoom=Math.max(this.minZoom,Math.min(this.maxZoom,newZoom));
    this.cameras.main.setZoom(this.currentZoom);
  }

  update(time,delta){
    // --- Player ---
    if(!this.moving){
      let dx=0,dy=0,dir=this.pDir;
      if(this.cursors.left.isDown||this.wasd.left.isDown){dx=-1;dir='left';}
      else if(this.cursors.right.isDown||this.wasd.right.isDown){dx=1;dir='right';}
      else if(this.cursors.up.isDown||this.wasd.up.isDown){dy=-1;dir='up';}
      else if(this.cursors.down.isDown||this.wasd.down.isDown){dy=1;dir='down';}
      this.pDir=dir;
      if(dx||dy){
        const nx=this.pTX+dx,ny=this.pTY+dy;
        if(this.canMove(nx,ny)){
          this.moving=true;this.pTX=nx;this.pTY=ny;
          this.targX=nx*TILE+TILE/2;this.targY=ny*TILE+TILE/2;
          this.pFrame=1-this.pFrame;
        }
      }
    }
    if(this.moving){
      const dx=this.targX-this.player.x,dy=this.targY-this.player.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<2){this.player.x=this.targX;this.player.y=this.targY;this.moving=false;}
      else{this.player.x+=dx/d*2;this.player.y+=dy/d*2;}
    }
    this.player.setTexture('player_'+this.pDir+'_'+(this.moving?this.pFrame:0));
    this.player.setDepth(this.player.y);

    // --- Agent Idle Animations ---
    this.agents.forEach(a=>{
      a.idleTimer+=delta;
      if(a.idle==='look'){
        if(a.idleState==='idle'&&a.idleTimer>a.nextIdleAt){
          a.idleState='looking';a.lookDir=Math.random()>0.5?'left':'right';
          a.idleTimer=0;a.lookDuration=randInt(500,1000);
        }else if(a.idleState==='looking'&&a.idleTimer>a.lookDuration){
          a.idleState='idle';a.idleTimer=0;a.nextIdleAt=randInt(3000,6000);
        }
        const dir=a.idleState==='looking'?a.lookDir:a.facing;
        a.spr.setTexture(a.id+'_'+dir+'_0');
      }else{
        if(a.idleState==='idle'){a.idleState='typing';a.idleTimer=0;a.nextPauseAt=randInt(2000,5000);}
        if(a.idleState==='typing'){
          a.typeFrame=Math.floor(a.idleTimer/350)%2;
          if(a.idleTimer>a.nextPauseAt){a.idleState='paused';a.idleTimer=0;a.pauseDuration=randInt(800,2000);}
        }else if(a.idleState==='paused'&&a.idleTimer>a.pauseDuration){
          a.idleState='typing';a.idleTimer=0;a.nextPauseAt=randInt(2000,5000);
        }
        const fr=a.idleState==='typing'?a.typeFrame:0;
        a.spr.setTexture(a.id+'_'+a.facing+'_'+fr);
      }
    });

    // --- Day/night (dimmed for indoor) ---
    this.dayTime+=(delta/1000)*this.daySpeed;
    if(this.dayTime>1)this.dayTime-=1;
    let nA=0;
    if(this.dayTime<0.2)nA=0.25;
    else if(this.dayTime<0.3)nA=0.25*(1-(this.dayTime-0.2)/0.1);
    else if(this.dayTime<0.7)nA=0;
    else if(this.dayTime<0.8)nA=0.25*((this.dayTime-0.7)/0.1);
    else nA=0.25;
    this.dayOverlay.setFillStyle(0x0a0a2e,nA);

    // --- HUD ---
    this.hudZone.setText(getZone(this.pTX,this.pTY));
    this.hudCoord.setText('X:'+this.pTX+' Y:'+this.pTY);
    const hrs=Math.floor(this.dayTime*24),mins=Math.floor((this.dayTime*24-hrs)*60);
    const h12=hrs%12||12,ap=hrs>=12?'PM':'AM';
    this.hudTime.setText(h12+':'+String(mins).padStart(2,'0')+' '+ap);
    this.hudZoom.setText('Zoom: '+(this.currentZoom*100).toFixed(0)+'%');
  }
}

window._game=new Phaser.Game({
  type:Phaser.CANVAS,
  parent:'game-container',
  width:MAP_W*TILE,
  height:MAP_H*TILE,
  pixelArt:true,
  roundPixels:true,
  antialias:false,
  backgroundColor:'#1a1a2e',
  scene:[GameScene],
  scale:{
    mode:Phaser.Scale.FIT,
    autoCenter:Phaser.Scale.CENTER_BOTH
  }
});

// --- Editor Functions ---
let currentEditAgent=null;
let currentEditScene=null;
const AVAILABLE_TOOLS=['webfetch','bash','read','write','edit','glob','grep'];
const AVAILABLE_MCP=['deepwiki','figma','refero'];
const AVAILABLE_SKILLS=['research-competitive','research-best-practices','generate-ui','generate-ux','generate-figma-specs','generate-code','critique-ux','critique-ui','critique-persona','review-panel','synthesize-design','design-quality-gate','design-checklist'];
const AVAILABLE_MODELS=['litellm/glm-latest','litellm/glm-flash-experimental','litellm/claude-opus-4-5','litellm/claude-opus-4-6','litellm/claude-sonnet-4-5','litellm/claude-sonnet-4-6','litellm/open-large','litellm/open-fast'];

function openEditor(agent,scene){
  currentEditAgent=agent;
  currentEditScene=scene;
  const modal=document.getElementById('editor-modal');
  modal.classList.add('active');
  
  document.getElementById('editor-title').textContent='Edit Agent: '+agent.name;
  document.getElementById('edit-id').value=agent.id;
  document.getElementById('edit-name').value=agent.name;
  document.getElementById('edit-role').value=agent.role;
  document.getElementById('edit-desc').value=agent.desc;
  document.getElementById('edit-zone').value=agent.zone;
  document.getElementById('edit-zc').value=hex(agent.zc);
  document.getElementById('edit-shirt').value=hex(agent.shirt);
  document.getElementById('edit-hair').value=hex(agent.hair);
  document.getElementById('edit-facing').value=agent.facing;
  document.getElementById('edit-tx').value=agent.tx;
  document.getElementById('edit-ty').value=agent.ty;
  document.getElementById('edit-idle').value=agent.idle;
  document.getElementById('edit-brain').value=agent.brain||'litellm/glm-latest';
  document.getElementById('edit-systemPrompt').value=agent.systemPrompt||'';
  
  renderChips('edit-tools-list',agent.tools||[],AVAILABLE_TOOLS,removeTool);
  renderChips('edit-mcp-list',agent.mcp||[],AVAILABLE_MCP,removeMcp);
  renderChips('edit-skills-list',agent.skills||[],AVAILABLE_SKILLS,removeSkill);
  renderModelChips();
  
  document.addEventListener('keydown',handleEsc);
}

function closeEditor(){
  document.getElementById('editor-modal').classList.remove('active');
  currentEditAgent=null;
  currentEditScene=null;
  document.removeEventListener('keydown',handleEsc);
}

function handleEsc(e){if(e.key==='Escape')closeEditor();}

function hex(c){return '#'+(c>>>0).toString(16).padStart(6,'0');}
function hexToNum(h){return parseInt(h.replace('#',''),16);}

function renderChips(containerId,items,available,onRemove){
  const container=document.getElementById(containerId);
  container.innerHTML='';
  items.forEach((item,i)=>{
    const chip=document.createElement('span');
    chip.className='chip';
    chip.innerHTML=item+' <span class="chip-remove" onclick="('+onRemove.name+')('+i+')">&times;</span>';
    container.appendChild(chip);
  });
}

function renderModelChips(){
  const container=document.getElementById('available-models');
  const current=document.getElementById('edit-brain').value;
  container.innerHTML='';
  AVAILABLE_MODELS.forEach(m=>{
    const chip=document.createElement('span');
    chip.className='model-chip'+(m===current?' selected':'');
    chip.textContent=m.replace('litellm/','');
    chip.onclick=()=>{document.getElementById('edit-brain').value=m;renderModelChips();};
    container.appendChild(chip);
  });
}

function addTool(){addChip('edit-tools-list','edit-tools','tools',AVAILABLE_TOOLS);}
function addMcp(){addChip('edit-mcp-list','edit-mcp','mcp',AVAILABLE_MCP);}
function addSkill(){addChip('edit-skills-list','edit-skills','skills',AVAILABLE_SKILLS);}

function addChip(listId,inputId,prop,available){
  const existing=Array.from(document.querySelectorAll('#'+listId+' .chip')).map(c=>c.textContent.replace('\xD7','').trim());
  const toAdd=available.filter(a=>!existing.includes(a))[0];
  if(toAdd&&currentEditAgent){
    currentEditAgent[prop].push(toAdd);
    renderChips(listId,currentEditAgent[prop],available,prop==='tools'?removeTool:prop==='mcp'?removeMcp:removeSkill);
  }
}

function removeTool(i){if(currentEditAgent){currentEditAgent.tools.splice(i,1);renderChips('edit-tools-list',currentEditAgent.tools,AVAILABLE_TOOLS,removeTool);}}
function removeMcp(i){if(currentEditAgent){currentEditAgent.mcp.splice(i,1);renderChips('edit-mcp-list',currentEditAgent.mcp,AVAILABLE_MCP,removeMcp);}}
function removeSkill(i){if(currentEditAgent){currentEditAgent.skills.splice(i,1);renderChips('edit-skills-list',currentEditAgent.skills,AVAILABLE_SKILLS,removeSkill);}}

function saveAgent(){
  if(!currentEditAgent||!currentEditScene)return;
  
  currentEditAgent.name=document.getElementById('edit-name').value;
  currentEditAgent.role=document.getElementById('edit-role').value;
  currentEditAgent.desc=document.getElementById('edit-desc').value;
  currentEditAgent.zone=document.getElementById('edit-zone').value;
  currentEditAgent.zc=hexToNum(document.getElementById('edit-zc').value);
  currentEditAgent.shirt=hexToNum(document.getElementById('edit-shirt').value);
  currentEditAgent.hair=hexToNum(document.getElementById('edit-hair').value);
  currentEditAgent.facing=document.getElementById('edit-facing').value;
  currentEditAgent.tx=parseInt(document.getElementById('edit-tx').value);
  currentEditAgent.ty=parseInt(document.getElementById('edit-ty').value);
  currentEditAgent.idle=document.getElementById('edit-idle').value;
  currentEditAgent.brain=document.getElementById('edit-brain').value;
  currentEditAgent.systemPrompt=document.getElementById('edit-systemPrompt').value;
  
  // Update sprite position
  currentEditAgent.spr.x=currentEditAgent.tx*TILE+TILE/2;
  currentEditAgent.spr.y=currentEditAgent.ty*TILE+TILE/2;
  currentEditAgent.spr.setDepth(currentEditAgent.ty*TILE);
  
  // Update label position
  currentEditAgent.label.x=currentEditAgent.spr.x;
  currentEditAgent.label.y=currentEditAgent.spr.y-11;
  currentEditAgent.label.setText(currentEditAgent.name);
  currentEditAgent.label.setColor(hex(currentEditAgent.zc));
  
  // Update collider
  const colliderIndex=currentEditScene.colliders.findIndex(c=>c.x===currentEditAgent.tx&&c.y===currentEditAgent.ty);
  if(colliderIndex>=0){
    currentEditScene.colliders[colliderIndex].x=currentEditAgent.tx;
    currentEditScene.colliders[colliderIndex].y=currentEditAgent.ty;
  }
  
  // Regenerate character sprite with new colors
  makeChar(currentEditAgent.id,currentEditAgent.shirt,currentEditAgent.hair);
  ['down','up','left','right'].forEach(dir=>{
    for(let f=0;f<2;f++){
      const key=currentEditAgent.id+'_'+dir+'_'+f;
      const canvas=textures[key];
      if(canvas)currentEditScene.textures.addCanvas(key,canvas);
    }
  });
  
  closeEditor();
}
</script>
