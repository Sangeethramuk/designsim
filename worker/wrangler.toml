name = "design-swarm-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
WORKER_VERSION = "1.0.0"

# ── KV Namespace: permanent share storage ────────────────────────────────────
# Setup (one-time):
#   cd worker
#   npx wrangler kv:namespace create SHARES
# Copy the `id` it prints and paste below, then redeploy:
#   npx wrangler deploy
[[kv_namespaces]]
binding = "SHARES"
id = "ced93a56336145f2aca876b3ef12191a"

# Secrets (set via: wrangler secret put SECRET_NAME)
# LLM_BASE_URL   — e.g. https://api.moonshot.cn
# LLM_API_KEY    — your LLM provider API key
# FIGMA_TOKEN    — Figma personal access token (optional)
# WORKER_SECRET  — optional passphrase to protect the worker
